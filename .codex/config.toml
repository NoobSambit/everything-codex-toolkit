# Everything Codex Toolkit reference config
#
# Copy this file into a project as `.codex/config.toml`, or use it as a
# reference when editing `~/.codex/config.toml`.
#
# Keep project config small. Put project behavior in AGENTS.md and enable MCP
# servers only when the project actually needs them.

approval_policy = "on-request"
sandbox_mode = "workspace-write"

persistent_instructions = "Follow AGENTS.md. Use toolkit skills and prompts only when they fit the current task."

[features]
multi_agent = true

[agents]
max_threads = 6
max_depth = 1

[agents.explorer]
description = "Read-only codebase explorer for gathering evidence before changes are proposed."
config_file = "agents/explorer.toml"

[agents.reviewer]
description = "Reviewer focused on correctness, security, behavioral regressions, and missing tests."
config_file = "agents/reviewer.toml"

[agents.docs_researcher]
description = "Documentation specialist that verifies APIs, framework behavior, and release notes."
config_file = "agents/docs-researcher.toml"

